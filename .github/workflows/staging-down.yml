name: Staging — Teardown

on:
  # Runs every 30 minutes to check if staging has been up > 2 hours
  schedule:
    - cron: '*/30 * * * *'
  # Also allow manual teardown
  workflow_dispatch:

jobs:
  staging-down:
    runs-on: ubuntu-latest
    steps:
      - name: Tear down staging if > 2 hours old
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            STAMP_FILE="/tmp/staging-started-$(basename ${{ secrets.REPO_DIR }})"
            if [ ! -f "$STAMP_FILE" ]; then
              echo "No staging instance found — nothing to do"
              exit 0
            fi
            STARTED=$(cat "$STAMP_FILE")
            NOW=$(date -u +%s)
            AGE=$((NOW - STARTED))
            if [ "$AGE" -gt 7200 ]; then
              echo "Staging has been up ${AGE}s (> 2h) — tearing down"
              cd ${{ secrets.REPO_DIR }}
              docker-compose -f docker-compose.yml -f docker-compose.staging.yml down
              rm -f "$STAMP_FILE"
            else
              echo "Staging up for ${AGE}s — leaving it running"
            fi

name: Deploy LifeOS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      setup_vps:
        description: 'Run full VPS setup (first-time only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: First-time VPS setup
        if: github.event.inputs.setup_vps == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail

            # Install Docker if missing
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
              usermod -aG docker $USER
            fi

            # Install Node.js 20 if missing
            if ! command -v node &>/dev/null || [[ "$(node -v)" != v20* && "$(node -v)" != v22* ]]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            # Install nginx if missing
            if ! command -v nginx &>/dev/null; then
              apt-get install -y nginx certbot python3-certbot-nginx
            fi

            # Install jq if missing (used by scheduled task scripts)
            if ! command -v jq &>/dev/null; then
              apt-get install -y jq
            fi

            # UFW firewall
            if command -v ufw &>/dev/null; then
              ufw allow 22/tcp
              ufw allow 80/tcp
              ufw allow 443/tcp
              ufw --force enable
            fi

            echo "VPS setup complete"

      - name: Deploy LifeOS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail

            REPO_DIR="${{ secrets.REPO_DIR }}"

            # Clone if not exists, otherwise pull
            if [ ! -d "$REPO_DIR" ]; then
              git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/shreyas-venkat/lifeos.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git checkout main
            # Clean untracked files that would block pull (VPS-only artifacts)
            git clean -fd
            git checkout -- .
            git pull origin main

            # Write .env from secrets (printf avoids DRONE_SSH line injection from script_stop)
            printf '%s\n' 'ASSISTANT_NAME=LifeOS' 'TZ=America/Edmonton' 'ONECLI_URL=http://127.0.0.1:10254' "DISCORD_BOT_TOKEN=${{ secrets.DISCORD_TOKEN }}" "DISCORD_OWNER_ID=${{ secrets.DISCORD_OWNER_ID }}" "GITHUB_TOKEN=${{ secrets.GH_TOKEN }}" "GOOGLE_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" "GOOGLE_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" "GOOGLE_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}" "GOOGLE_CALENDAR_REFRESH_TOKEN=${{ secrets.GOOGLE_CALENDAR_REFRESH_TOKEN }}" "MOTHERDUCK_TOKEN=${{ secrets.MOTHERDUCK_TOKEN }}" > .env
            chmod 600 .env

            # Install all deps (need typescript for build), then prune after
            npm install --ignore-scripts

            # Build container image
            if [ -f "./container/build.sh" ]; then
              chmod +x ./container/build.sh
              ./container/build.sh
            fi

            # Set up systemd service if not exists
            SERVICE_FILE="$HOME/.config/systemd/user/nanoclaw.service"
            if [ ! -f "$SERVICE_FILE" ]; then
              mkdir -p "$HOME/.config/systemd/user"
              cat > "$SERVICE_FILE" << SVCEOF
            [Unit]
            Description=NanoClaw LifeOS
            After=network.target docker.service

            [Service]
            Type=simple
            WorkingDirectory=$REPO_DIR
            ExecStart=$(which node) dist/index.js
            Restart=always
            RestartSec=10
            Environment=NODE_ENV=production

            [Install]
            WantedBy=default.target
            SVCEOF

              systemctl --user daemon-reload
              systemctl --user enable nanoclaw
              loginctl enable-linger $USER
            fi

            # Ensure session + IPC dirs are writable by container user (node, uid 1000)
            mkdir -p data/sessions data/ipc
            chown -R 1000:1000 data/sessions data/ipc

            # Build TypeScript (fail loudly if tsc breaks)
            npm run build

            # Remove devDependencies after build
            npm prune --omit=dev

            # Restart service
            systemctl --user restart nanoclaw || systemctl --user start nanoclaw

            echo "LifeOS deployed at $(date)"
            systemctl --user status nanoclaw --no-pager || true

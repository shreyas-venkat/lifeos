name: Staging — Deploy

on:
  push:
    branches: [staging]

jobs:
  staging-up:
    runs-on: ubuntu-latest
    steps:
      - name: Spin up staging on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.REPO_DIR }}
            git fetch origin staging
            git checkout staging
            git pull origin staging
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build --no-deps
            echo "$(date -u +%s)" > /tmp/staging-started-$(basename ${{ secrets.REPO_DIR }})
            echo "Staging up at $(date)"

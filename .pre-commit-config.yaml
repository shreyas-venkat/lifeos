repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (lint)
        entry: ruff check --fix
        language: system
        types: [python]
        require_serial: false

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        require_serial: false

      # Uncomment if using TypeScript/React:
      # - id: prettier
      #   name: prettier
      #   entry: npx prettier --write
      #   language: system
      #   types_or: [javascript, jsx, ts, tsx, json, css]
      #   require_serial: false

      - id: pytest-unit
        name: pytest (unit — no integration)
        entry: python -m pytest tests/ -v -m "not integration" -x
        language: system
        pass_filenames: false
        stages: [pre-commit]
